kind = "web"
previewPath = "/"
title = "Cuidados Domiciliarios — Landing Page"
version = "1.0.0"
id = "artifacts/cuidados-domiciliarios"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23577

[services.development]
run = "pnpm --filter @workspace/cuidados-domiciliarios run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cuidados-domiciliarios", "run", "build" ]
publicDir = "artifacts/cuidados-domiciliarios/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23577"
BASE_PATH = "/"
